[project]
name = "crewday"
version = "0.0.1"
description = "crew.day — ops co-pilot for short-term-rental and small-hospitality teams."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy>=2.0",
    "alembic",
    "pydantic>=2.6",
    "pydantic-settings",
    "python-multipart",
    "webauthn",
    "python-ulid",
    "apscheduler",
    "httpx",
    "icalendar",
    "python-dateutil",
    "itsdangerous",
    "weasyprint",
    "click",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "schemathesis",
    "playwright",
    "ruff",
    "mypy",
    "import-linter",
    "locust",
    "factory-boy",
    "hypothesis",
    # Postgres driver for the integration-test shard in CI. The sync
    # engine builds `postgresql+psycopg://` URLs (see
    # `app/adapters/db/session.py::normalise_sync_url`) so psycopg 3 must
    # be installed wherever integration tests target PG. SQLite shards
    # don't need it but installing in dev keeps parity with CI.
    "psycopg[binary]",
]

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = ["mocks"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
python_version = "3.12"
plugins = ["pydantic.mypy"]
explicit_package_bases = true
namespace_packages = true
exclude = ["mocks/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# Use importlib to prevent per-context dir name collisions
# (tests/unit/<ctx>/test_smoke.py appears under 13 contexts). The
# trade-off is that pytest no longer injects the project root into
# sys.path implicitly, so we set ``pythonpath`` to make ``app`` and
# ``tests._fakes``/``tests.factories`` importable.
addopts = "--import-mode=importlib"
pythonpath = ["."]
markers = [
    "integration: marks tests as integration (deselect with '-m \"not integration\"')",
]

[tool.coverage.run]
source = ["app"]
omit = ["*/migrations/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
