[build-system]
# Hatchling gives us a PEP 517 backend with first-class support for
# the multi-package layout this repo needs: ``app/`` ships as the
# ``app`` distribution root and ``cli/crewday/`` is re-rooted as the
# top-level ``crewday`` package so ``[project.scripts] crewday =
# "crewday._main:main"`` resolves (see ``[tool.hatch.build.targets.wheel]``
# below). Chosen over ``setuptools`` because the ``sources`` remap is
# declarative rather than a ``package_dir`` / ``MANIFEST.in`` pairing.
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "crewday"
version = "0.0.1"
description = "crew.day — ops co-pilot for short-term-rental and small-hospitality teams."
readme = "README.md"
requires-python = ">=3.14"
license = { text = "Apache-2.0" }
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy>=2.0",
    "alembic",
    "pydantic>=2.6",
    "pydantic-settings",
    "python-multipart",
    "webauthn",
    "python-ulid",
    "apscheduler",
    "httpx",
    "icalendar",
    "python-dateutil",
    "itsdangerous",
    "weasyprint",
    "click",
    # argon2id hashing for API-token secrets (§03 "API tokens",
    # §15 "Token hashing"). The secret never leaves the server as
    # plaintext after mint; only its argon2id digest is stored, so a
    # DB leak cannot be replayed.
    "argon2-cffi>=23",
    # AES-256-GCM for the envelope-encryption seam (cd-1ai) — see
    # :mod:`app.adapters.storage.envelope` and
    # ``docs/specs/15-security-privacy.md`` §"Secret envelope". This
    # package is already pulled in transitively by ``webauthn``, but
    # pinning it directly makes the dependency explicit: the envelope
    # seam is a production invariant, not something a bump to
    # ``webauthn`` may quietly drop.
    "cryptography>=42",
    # Jinja2 for §10 email + push template rendering. The notification
    # service (cd-y1ge) loads ``<kind>.<channel>.j2`` files from
    # :mod:`app.domain.messaging.templates`; every email and push
    # payload is a rendered template. Pinning Jinja2 directly (not via
    # a transitive dep) makes the dependency explicit and survives a
    # future dev-tool shake-up that might drop Flask / locust.
    "jinja2>=3.1",
    # PyYAML for the CLI codegen pipeline (cd-1cfg). The exclusion
    # manifest :file:`cli/crewday/_exclusions.yaml` ships as YAML
    # (not TOML / JSON) because reviewers need to add entries with a
    # `reason:` comment block — YAML's `#` comments survive into the
    # diff while JSON strips them. PyYAML is already present as a
    # transitive of ``uvicorn[standard]`` + ``schemathesis`` but we
    # pin it directly so a future shake-up of those deps does not
    # silently break ``python -m crewday._codegen``.
    "pyyaml>=6.0",
    # Pure-Python magic-byte MIME sniffer (cd-ba5c). Powers the
    # ``MimeSniffer`` port at :mod:`app.adapters.storage.mime` so the
    # task evidence pipeline can reject an EXE declared as ``image/png``
    # before it lands in the blob store (spec §15 "Input validation":
    # "MIME sniffed server-side; we trust the sniff, not the header").
    # Picked over ``python-magic`` to avoid pulling a libmagic system
    # dependency — matches the project's "no system dep where avoidable"
    # posture. ``filetype`` covers the formats we accept on the evidence
    # surface (PNG / JPEG / WEBP / HEIC / WAV / MP3 / WebM / OGG / MP4 /
    # AAC) plus the executable formats an attacker is most likely to
    # smuggle through (PE / ELF / Mach-O). JSON is text and not
    # magic-byte detectable; the GPS branch wraps a structural check.
    "filetype>=1.2",
    "prometheus-client>=0.25.0",
    "opentelemetry-api>=1.41.1",
    "opentelemetry-sdk>=1.41.1",
    "opentelemetry-instrumentation-fastapi>=0.62b1",
    "opentelemetry-instrumentation-sqlalchemy>=0.62b1",
    "opentelemetry-instrumentation-httpx>=0.62b1",
    "opentelemetry-exporter-otlp>=1.41.1",
]

# ``crewday`` is the sole console-script entry point. The target is
# :func:`crewday._main.main` — a ``@click.group`` wrapped by
# :func:`crewday._main.handle_errors`. See ``docs/specs/13-cli.md``
# §"Package layout" and Beads ``cd-j202``.
[project.scripts]
crewday = "crewday._main:main"

# Hatchling wheel layout. We ship two packages from this repo:
#   * ``app`` — the server distribution (FastAPI + domain + adapters).
#   * ``crewday`` — the CLI, which lives under ``cli/crewday/`` on
#     disk but is exposed at the top level of the wheel so the
#     ``[project.scripts] crewday`` entry resolves with a plain
#     ``import crewday._main``.
# ``sources`` remaps the on-disk path so ``cli/crewday/foo.py``
# becomes ``crewday/foo.py`` in the built wheel — no symlinks, no
# ``__init__.py`` redirects.
[tool.hatch.build.targets.wheel]
packages = ["app", "cli/crewday"]

[tool.hatch.build.targets.wheel.sources]
"cli/crewday" = "crewday"

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pytest-xdist",
    "schemathesis",
    "playwright",
    # Pytest plugin that exposes ``page`` / ``context`` / ``browser`` /
    # ``browser_type`` fixtures + ``--browser`` / ``--headed`` /
    # ``--video`` / ``--tracing`` CLI flags. The :file:`tests/e2e/`
    # suite (cd-ndmv) consumes ``page`` + ``browser`` directly and the
    # tracing flag is what gates trace.zip on failure (§17 "End-to-end").
    "pytest-playwright",
    # Pure-Python port of Mapbox's pixelmatch — drives the visual
    # regression harness in ``tests/e2e/_helpers/visual.py``. §17 sets
    # the contract: ``/styleguide`` fails on > 0.1 % diff, every other
    # route on > 0.5 %. Pillow is already in the venv (transitive of
    # ``locust``); pixelmatch + Pillow give us pixel-level diff +
    # ``_diff/<name>.png`` artefacts when a baseline drifts.
    "pixelmatch",
    "ruff",
    "mypy",
    "import-linter",
    "locust",
    "factory-boy",
    "hypothesis",
    # Postgres driver for the integration-test shard in CI. The sync
    # engine builds `postgresql+psycopg://` URLs (see
    # `app/adapters/db/session.py::normalise_sync_url`) so psycopg 3 must
    # be installed wherever integration tests target PG. SQLite shards
    # don't need it but installing in dev keeps parity with CI.
    "psycopg[binary]",
    # Spin up a real Postgres 15 per integration-test session (cd-rhaj).
    # The sqlite shard never touches this package, but it's cheap to
    # install in dev and keeps the PG shard hermetic: no need for a
    # services: postgres block in CI — testcontainers handles container
    # lifecycle from inside the test process.
    "testcontainers[postgres]",
    # Type stubs for :mod:`dateutil` used by
    # :mod:`app.domain.tasks.schedules` (RRULE parsing). Without the
    # stubs, ``mypy --strict`` flags ``from dateutil.rrule import
    # rrulestr`` as untyped; installing them keeps the strict gate
    # green without a blanket ``ignore_missing_imports``.
    "types-python-dateutil",
    # Type stubs for :mod:`yaml` used by the CLI codegen pipeline
    # (cd-1cfg). ``mypy --strict`` rejects ``import yaml`` as untyped
    # without them, and the codegen module is in scope for the strict
    # gate (``mypy cli/crewday/_codegen.py``).
    "types-PyYAML",
]

[tool.ruff]
line-length = 88
target-version = "py314"
extend-exclude = ["mocks"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
python_version = "3.14"
plugins = ["pydantic.mypy"]
explicit_package_bases = true
namespace_packages = true
exclude = ["mocks/"]
# Map the on-disk ``cli/crewday/`` directory to the ``crewday``
# top-level package so ``mypy cli/`` resolves imports the same way
# the wheel layout does (see
# ``[tool.hatch.build.targets.wheel.sources]``). Without this,
# mypy would walk ``cli/crewday/_globals.py`` as the module
# ``cli.crewday._globals`` and then also find the installed copy as
# ``crewday._globals``, tripping its duplicate-module check.
mypy_path = "cli"

# APScheduler 3.x ships no ``py.typed`` marker and has no published
# stubs. The wrapper in :mod:`app.worker.scheduler` narrows the
# surface we depend on to ``AsyncIOScheduler`` + trigger classes;
# the ``ignore_missing_imports`` keeps ``mypy --strict`` quiet
# without masking type issues in our own code. Drops if APScheduler
# ships a typed release, or when we migrate to 4.x (which is
# typed).
[[tool.mypy.overrides]]
module = [
    "apscheduler.*",
]
ignore_missing_imports = true

# ``filetype`` (cd-ba5c) ships no ``py.typed`` marker. The wrapper in
# :mod:`app.adapters.storage.mime` narrows the surface we depend on to
# :func:`filetype.guess` (returns ``filetype.types.Type | None`` whose
# ``.mime`` is a ``str``); the ``ignore_missing_imports`` keeps
# ``mypy --strict`` quiet without masking type issues in our own code.
# Drops if upstream ships a typed release.
[[tool.mypy.overrides]]
module = [
    "filetype",
    "filetype.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# Use importlib to prevent per-context dir name collisions
# (tests/unit/<ctx>/test_smoke.py appears under 13 contexts). The
# trade-off is that pytest no longer injects the project root into
# sys.path implicitly, so we set ``pythonpath`` to make ``app`` and
# ``tests._fakes``/``tests.factories`` importable.
#
# ``-n auto --dist worksteal`` runs the suite across one xdist worker
# per CPU; worksteal rebalances when one worker hits a long-tail test
# (~7s outlier in tests/unit/test_tenancy_orm_filter.py). Per-worker
# DB isolation is handled by tests/integration/conftest.py::db_url
# (per-worker SQLite file / Postgres testcontainer). To debug a single
# test serially, override the worker count: ``uv run pytest -n0 <path>``
# (xdist itself accepts ``-n0`` and skips the worker fork).
addopts = "--import-mode=importlib -n auto --dist worksteal -m \"not schemathesis\""
pythonpath = ["."]
markers = [
    "integration: marks tests as integration (deselect with '-m \"not integration\"')",
    "pg_only: test requires Postgres (skipped when CREWDAY_TEST_DB=sqlite)",
    "schemathesis: API-contract tests that drive the schemathesis CLI as a subprocess (cd-3j25). Excluded from the default unit/integration runs via ``addopts = -m 'not schemathesis'`` — opt in with ``pytest -m schemathesis``.",
]

[tool.coverage.run]
source = ["app"]
omit = ["*/migrations/*", "*/__init__.py"]

# CSP inline linter (cd-wv2v).
#
# ``scripts/check_csp_inlines.py`` walks ``app/web/dist/**/*.html`` and
# refuses any ``<script>`` or ``<style>`` tag that is inline (no ``src=``
# / ``href=``) and not nonced. The strict CSP served by
# :class:`app.api.middleware.SecurityHeadersMiddleware` only accepts
# nonced inlines; an un-nonced one would silently be refused by the
# browser, breaking the SPA with no server-side error.
#
# Run locally:
#
#   uv run python scripts/check_csp_inlines.py
#   uv run python scripts/check_csp_inlines.py app/web/dist
#
# Wiring this into CI is deployment-infra scope (separate task); the
# script is ready to drop into any pipeline that already invokes the
# scripts/ directory. See docs/specs/15-security-privacy.md
# §"HTTP security headers".
[tool.check_csp]
default_path = "app/web/dist"

[tool.coverage.report]
show_missing = true
skip_covered = true

# Import boundary contracts (cd-ev0).
#
# Enforces the rules in docs/specs/01-architecture.md §"Boundary rules"
# and docs/specs/17-testing-quality.md §"Import boundaries":
#   1. `app.domain` must not import `app.adapters` (ports.py is the
#      one exception — it's the Protocol seam).
#   2. `app.domain` must not import handlers (`app.api`, `app.web`,
#      `app.cli`, `cli`) or `app.worker` (the scheduler/worker layer
#      drives the domain, not the other way around — §17 "Layer
#      contract").
#   3. `app.adapters` must not import handlers or `app.worker` either.
#
# A fourth contract in the spec — each `domain.<X>` may only reach
# siblings through the sibling's `__init__.py` public surface — is
# deferred until domain contexts grow submodules (today every
# `app/domain/<ctx>/__init__.py` is a docstring-only stub). Tracked
# as a follow-up Beads task.
#
# `include_external_packages = true` lets us name modules that don't
# yet exist as packages in the tree (e.g. `app.cli`, `cli`) without
# import-linter failing its build-graph step. `unmatched_ignore_imports_
# alerting = "none"` lets us describe the long-term allowlist now
# (e.g. `app.domain.** -> app.adapters.*.ports`) without tripping
# when no such imports exist yet.
[tool.importlinter]
# ``crewday`` joins ``app`` in the graph so the CLI-layer contract
# below (``"CLI forbids app server internals"``) has something to walk.
# Both packages are installed by the wheel remap in
# ``[tool.hatch.build.targets.wheel]``.
root_packages = ["app", "crewday"]
include_external_packages = true

[[tool.importlinter.contracts]]
name = "Domain forbids adapters (except ports)"
type = "forbidden"
source_modules = ["app.domain"]
forbidden_modules = ["app.adapters"]
ignore_imports = [
    "app.domain.** -> app.adapters.*.ports",
    "app.domain.** -> app.adapters.*.ports.*",
    # Per-context repository ports live in the domain's public surface
    # (``app/domain/<context>/ports.py``) per
    # ``docs/specs/01-architecture.md`` §"Boundary rules" rule 4 —
    # cd-duv6's ``app.adapters.db.<context>.ports`` placement was
    # reconciled by cd-jzfc, so no extra wildcard is needed here.
    # v1 stopgap (cd-mb5n): ``app.domain.identity._owner_guard`` is the
    # shared cross-dialect locking primitive for the last-owner
    # invariant; both ``remove_member`` and ``revoke`` delegate their
    # owner-count read to it. It imports :class:`PermissionGroup` /
    # :class:`PermissionGroupMember` from ``app.adapters.db.authz.models``
    # for the same reason as its siblings — the Protocol-seam refactor
    # hasn't landed yet. Drops with cd-duv6 alongside the other
    # ``app.domain.identity`` exceptions.
    "app.domain.identity._owner_guard -> app.adapters.db.authz.models",
    # v1 stopgap (cd-jpa): ``app.domain.identity.membership`` reads
    # identity + authz + workspace ORM models directly. Same
    # Protocol-seam refactor as the siblings above; tracked by
    # cd-duv6 (extended scope). Drops once the repositories land.
    "app.domain.identity.membership -> app.adapters.db.authz.models",
    "app.domain.identity.membership -> app.adapters.db.identity.models",
    "app.domain.identity.membership -> app.adapters.db.workspace.models",
    # The invite flow delegates token mint + consume to
    # :mod:`app.auth.magic_link`, which itself reads identity ORM
    # models directly (cd-4zz stopgap at the auth-layer level).
    # Shielding the transitive edge keeps the "domain can't touch
    # adapters" contract honest without forcing every auth domain
    # call to route through a port.
    "app.domain.identity.membership -> app.auth.magic_link",
    # v1 stopgap (cd-dv2): the existing
    # ``app.services.employees.service`` reads
    # :class:`UserWorkspace` / :class:`WorkEngagement` /
    # :class:`UserWorkRole` from ``app.adapters.db.workspace.models``
    # (and identity models via existing seams). The transitive edge
    # surfaces now that ``app.domain.identity.membership`` imports
    # the seed-pending helper from
    # ``app.services.employees.service``. Same Protocol-seam pattern
    # as the other identity stopgaps; tracked by cd-duv6 — drops
    # once the workspace + identity repositories land.
    "app.services.employees.service -> app.adapters.db.workspace.models",
    "app.domain.identity.membership -> app.services.employees.service",
    # v1 stopgap (cd-ckr): the owners-membership check lives under
    # ``app.authz.owners`` so the tenancy middleware (cd-7y4) and
    # the identity domain share one SELECT shape. ``app.authz``
    # itself is not ``app.domain`` so the contract would allow its
    # direct ``app.adapters`` import, but the transitive walk from
    # ``app.domain.identity.role_grants → app.authz.owners →
    # app.adapters.db.authz.models`` trips the checker. Ignoring the
    # intermediate edge keeps the DRY'd seam honest without
    # loosening the top-level "domain can't touch adapters" rule.
    # Drops with cd-duv6 when the proper repository protocol lands.
    "app.domain.identity.role_grants -> app.authz.owners",
    # ``app.audit`` is the canonical write seam for the audit log and
    # is intended to be called from every domain service (see
    # ``docs/specs/01-architecture.md`` §"Shared kernel" —
    # the audit writer sits above both domain and adapters). Its
    # implementation imports the ORM model class from
    # ``app.adapters.db.audit.models`` purely so ``write_audit`` can
    # construct a row; callers never see that dependency. Shielding
    # the transitive import keeps the contract honest without
    # forcing every domain caller to route through a third-party port.
    "app.audit -> app.adapters.db.audit.models",
    # v1 stopgap (cd-0tg): ``app.domain.tasks.templates`` reads
    # :class:`TaskTemplate` / :class:`Schedule` from
    # ``app.adapters.db.tasks.models`` directly. Same Protocol-seam
    # pattern as the identity stopgaps above; tracked by cd-duv6
    # (extended scope) — drops once the tasks repositories land.
    "app.domain.tasks.templates -> app.adapters.db.tasks.models",
    # v1 stopgap (cd-k4l): ``app.domain.tasks.schedules`` reads
    # :class:`Schedule` / :class:`Occurrence` / :class:`TaskTemplate`
    # from ``app.adapters.db.tasks.models`` directly. Same
    # Protocol-seam pattern as ``app.domain.tasks.templates``;
    # tracked by cd-duv6 (extended scope) — drops once the tasks
    # repositories land.
    "app.domain.tasks.schedules -> app.adapters.db.tasks.models",
    # v1 stopgap (cd-0rf): ``app.domain.tasks.oneoff`` reads
    # :class:`TaskTemplate` / :class:`Occurrence` from
    # ``app.adapters.db.tasks.models`` and :class:`Property` from
    # ``app.adapters.db.places.models`` (to resolve the property
    # timezone for the local → UTC projection). It also invokes
    # :func:`app.authz.enforce.require` for the ``tasks.create``
    # defence-in-depth check. Same Protocol-seam pattern as the
    # other tasks services above; tracked by cd-duv6 (extended
    # scope) — drops once the repositories land.
    "app.domain.tasks.oneoff -> app.adapters.db.tasks.models",
    "app.domain.tasks.oneoff -> app.adapters.db.places.models",
    "app.domain.tasks.oneoff -> app.adapters.db.workspace.models",
    "app.domain.tasks.oneoff -> app.authz",
    # v1 stopgap (cd-8u5): ``app.domain.places.property_service``
    # reads :class:`Property` and :class:`PropertyWorkspace` from
    # ``app.adapters.db.places.models`` directly. Same Protocol-
    # seam pattern as ``app.domain.tasks.templates``. The
    # membership / unit services below follow the same direct-model
    # shape for role-grant membership and default-unit creation.
    # Tracked by cd-duv6 (extended scope) — drops once the places
    # repositories land.
    "app.domain.places.property_service -> app.adapters.db.places.models",
    "app.domain.places.membership_service -> app.adapters.db.authz.models",
    "app.domain.places.membership_service -> app.adapters.db.places.models",
    "app.domain.places.membership_service -> app.authz.owners",
    "app.domain.places.unit_service -> app.adapters.db.places.models",
    # v1 stopgap (cd-1ai): ``app.domain.stays.ical_service`` reads
    # :class:`IcalFeed` from ``app.adapters.db.stays.models`` directly.
    # Guest links and turnover generation still read the stays / places
    # ORM rows directly for signed-link state and checkout-driven task
    # generation. Same Protocol-seam pattern as the places / tasks
    # stopgaps above; tracked by cd-duv6 (extended scope) — drops once
    # the stays repositories land.
    "app.domain.stays.ical_service -> app.adapters.db.stays.models",
    "app.domain.stays.guest_link_service -> app.adapters.db.stays.models",
    "app.domain.stays.turnover_generator -> app.adapters.db.places.models",
    "app.domain.stays.turnover_generator -> app.adapters.db.stays.models",
    # v1 stopgap (cd-whl): ``app.domain.time.shifts`` reads
    # :class:`Shift` + ``_SHIFT_SOURCE_VALUES`` from
    # ``app.adapters.db.time.models`` directly. Same Protocol-seam
    # pattern as ``app.domain.tasks.templates``; tracked by cd-duv6
    # (extended scope) — drops once the time repositories land.
    "app.domain.time.shifts -> app.adapters.db.time.models",
    # v1 stopgap (cd-whl): ``app.domain.time.shifts`` invokes
    # :func:`app.authz.enforce.require` for the ``time.clock_self``
    # / ``time.edit_others`` capability checks. ``app.authz``
    # transitively reads ORM models (see the sibling
    # ``app.domain.identity.role_grants -> app.authz.owners`` ignore
    # above); the intermediate edge is therefore whitelisted with the
    # same reasoning. Drops with cd-duv6.
    "app.domain.time.shifts -> app.authz",
    # v1 stopgap (cd-y1ge): ``app.domain.messaging.notifications``
    # reads :class:`Notification`, :class:`PushToken`,
    # :class:`EmailOptOut` from ``app.adapters.db.messaging.models``
    # and :class:`User` from ``app.adapters.db.identity.models``
    # (to resolve the recipient's locale for template rendering).
    # Same Protocol-seam pattern as the other domain stopgaps;
    # tracked by cd-duv6 (extended scope) — drops once the messaging
    # repositories land.
    "app.domain.messaging.notifications -> app.adapters.db.messaging.models",
    "app.domain.messaging.notifications -> app.adapters.db.identity.models",
    # v1 stopgap (cd-k0qf): ``app.domain.llm.router`` reads
    # :class:`ModelAssignment` / :class:`LlmCapabilityInheritance`
    # from ``app.adapters.db.llm.models`` directly. Same Protocol-
    # seam pattern as the tasks / places / time stopgaps above;
    # tracked by cd-duv6 (extended scope) — drops once the LLM
    # repositories land.
    "app.domain.llm.router -> app.adapters.db.llm.models",
    # v1 stopgap (cd-9ghv): the agent runtime persists approval
    # requests / tool audit detail through the LLM and messaging ORM
    # rows directly. Same Protocol-seam pattern as the LLM router;
    # tracked by cd-duv6 — drops once the agent runtime has repository
    # ports.
    "app.domain.agent.approval -> app.adapters.db.llm.models",
    "app.domain.agent.runtime -> app.adapters.db.llm.models",
    "app.domain.agent.runtime -> app.adapters.db.messaging.models",
    # v1 stopgap (cd-irng): ``app.domain.llm.budget`` reads
    # :class:`BudgetLedger` / :class:`LlmUsage` from
    # ``app.adapters.db.llm.models`` directly — the rolling 30-day
    # envelope needs both to check the cached aggregate and to
    # write the post-flight usage row. Same Protocol-seam pattern
    # as the router above; tracked by cd-duv6 (extended scope) —
    # drops once the LLM repositories land.
    "app.domain.llm.budget -> app.adapters.db.llm.models",
    # v1 stopgap (cd-8luu): ``app.domain.tasks.assignment`` reads
    # :class:`Occurrence` / :class:`Schedule` from
    # ``app.adapters.db.tasks.models`` for the §06 "Assignment
    # algorithm" walk + default workload port. Same Protocol-seam
    # pattern as the other tasks services above; tracked by
    # cd-duv6 (extended scope) — drops once the tasks repositories
    # land.
    "app.domain.tasks.assignment -> app.adapters.db.tasks.models",
    # v1 stopgap (cd-7am7): ``app.domain.tasks.completion`` reads
    # :class:`Occurrence` / :class:`ChecklistItem` / :class:`Evidence`
    # from ``app.adapters.db.tasks.models`` and :class:`Movement`
    # from ``app.adapters.db.inventory.models`` for the state
    # machine + inventory-apply hook. Same Protocol-seam pattern
    # as the other tasks services; tracked by cd-duv6 — drops once
    # the tasks + inventory repositories land.
    "app.domain.tasks.completion -> app.adapters.db.tasks.models",
    "app.domain.tasks.completion -> app.adapters.db.inventory.models",
    # cd-ba5c: ``app.domain.tasks.completion.add_file_evidence`` uses
    # :class:`FiletypeMimeSniffer` as the default MIME sniffer so the
    # seam is opt-in (callers pass a fake via DI in tests). The
    # Protocol port (:class:`MimeSniffer`) reaches through
