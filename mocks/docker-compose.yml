# crewday — UI preview mocks.
#
# Exposed at https://dev.crewday.app via the shared Pangolin/Traefik
# stack (same pattern as fj2). Both the public URL and the local
# 127.0.0.1:8100 forward hit the same `web-dev` (Vite) container, so
# SPA edits hot-reload everywhere — no rebuild, no baked-dist drift.
# Vite proxies /api, /events, /switch, /theme, /agent, /healthz,
# /readyz, /metrics to the `mocks` FastAPI container on :8000, which
# gets .py HMR via `uvicorn --reload`.
#
# Pangolin needs a corresponding "resource" entry for dev.crewday.app
# (add via the Pangolin dashboard once) — until that's set, requests
# hit badger's forward-auth and land on the login flow.

name: "crewday-mocks"

services:
  mocks:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crewday-mocks
    restart: unless-stopped
    user: "10001:10001"
    volumes:
      # Bind-mount keeps the Python layer in sync on every save. Paired
      # with `uvicorn --reload`, every .py change is picked up with
      # zero `docker compose restart`. The SPA bundle baked into the
      # image is only used for the Traefik/prod path — local dev is
      # served by the `web-dev` container on :8100 below.
      - ./app:/app/app:ro
    # No host-port publication: local dev goes through the web-dev
    # container at 127.0.0.1:8100, which proxies /api & /events to
    # `mocks:8000` over the compose network. Traefik also connects
    # over the compose network (see labels), so this container does
    # not need an external port.
    expose:
      - "8000"
    networks:
      - default

  # Front-end HMR for both local and public access. The container
  # installs dependencies on first boot (slower), then `vite` watches
  # ./web via the bind-mount and hot-reloads in the browser.
  #
  # Vite's dev server on :5173 is published as 127.0.0.1:8100 for
  # direct host access, and also joined to the traefik-proxy network
  # so https://dev.crewday.app routes here too (HMR ws upgrade is
  # handled by Traefik). Vite proxies /api, /events, /switch, /theme,
  # /agent, /healthz, /readyz, /metrics to the `mocks` service via
  # VITE_BACKEND_URL. That way code edits appear on both URLs without
  # rebuilding any image.
  web-dev:
    image: node:22-alpine
    container_name: crewday-web-dev
    restart: unless-stopped
    working_dir: /web
    command: sh -lc "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_BACKEND_URL: "http://mocks:8000"
    volumes:
      - ./web:/web
    ports:
      - "127.0.0.1:8100:5173"
    depends_on:
      - mocks
    networks:
      - default
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.crewday-dev.rule=Host(`dev.crewday.app`)"
      - "traefik.http.routers.crewday-dev.entrypoints=websecure"
      - "traefik.http.routers.crewday-dev.tls.certresolver=letsencrypt"
      - "traefik.http.routers.crewday-dev.middlewares=badger@file"
      - "traefik.http.routers.crewday-dev.service=crewday-dev"
      - "traefik.http.services.crewday-dev.loadbalancer.server.port=5173"
      - "traefik.http.services.crewday-dev.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.crewday-dev.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.crewday-dev.loadbalancer.healthcheck.hostname=dev.crewday.app"

networks:
  traefik-proxy:
    external: true
