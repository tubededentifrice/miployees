<!doctype html>
<html lang="en" data-theme="{{ theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3F6E3B">
  <title>{% block title %}miployees — preview{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="surface {% block body_class %}{% endblock %}" data-role="{{ role }}" data-theme="{{ theme }}">
  <svg class="grain" aria-hidden="true">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="preview-banner">
    <span class="preview-banner__badge">PREVIEW</span>
    <span class="preview-banner__note">Interactive mocks · no real data</span>
    <nav class="preview-banner__switch" aria-label="Preview controls">
      <a href="/switch/employee" class="pill {% if role == 'employee' %}pill--active{% endif %}">Employee</a>
      <a href="/switch/manager"  class="pill {% if role == 'manager'  %}pill--active{% endif %}">Manager</a>
      <a href="/theme/toggle" class="pill pill--ghost" aria-label="Toggle theme">
        {% if theme == 'dark' %}☀{% else %}☾{% endif %}
      </a>
      <a href="/styleguide" class="pill pill--ghost">§ styleguide</a>
    </nav>
  </div>

  {% block layout %}{% endblock %}
</body>
</html>
